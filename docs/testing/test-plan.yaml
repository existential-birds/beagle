version: 1
metadata:
  branch: feat/strategy-skill
  base: main
  generated: "2026-04-10T12:00:00Z"
  changes_summary: |
    Adds two new strategy skills to beagle-analysis (strategy-interview and strategy-review)
    with 13 reference files providing framework guidance (kernel, bad-strategy, Wardley mapping,
    Playing to Win, Blue Ocean, review dimensions, review lenses, judge artifact schema, etc.).
    Refactors the beagle-docs humanize skill into SKILL.md + 3 reference files.
    Updates marketplace.json and plugin.json with new keywords/tags.

setup:
  stack:
    - type: markdown
      package_manager: none
  prerequisites:
    - name: Python 3 (for YAML/JSON validation)
      check: "python3 --version"
    - name: Git
      check: "git --version"
  build: []
  services: []
  env: {}

tests:
  # --- Plugin Discovery Chain ---

  - id: TC-01
    name: Marketplace manifest is valid JSON with correct plugin paths
    context: |
      marketplace.json was updated to add "strategy" tag to beagle-analysis.
      If this file is malformed or plugin source paths are wrong, Claude Code
      won't discover any skills in the marketplace.
    steps:
      - run: python3 -c "import json; data = json.load(open('.claude-plugin/marketplace.json')); assert 'plugins' in data; print(f'{len(data[\"plugins\"])} plugins found')"
      - run: |
          python3 -c "
          import json, os
          data = json.load(open('.claude-plugin/marketplace.json'))
          for p in data['plugins']:
              src = p['source']
              assert os.path.isdir(src), f'Missing plugin dir: {src}'
              print(f'OK: {p[\"name\"]} -> {src}')
          "
    expected: |
      All 12 plugins listed. Every source path resolves to an existing directory.

  - id: TC-02
    name: beagle-analysis plugin.json is valid and has strategy keywords
    context: |
      plugin.json was updated with "strategy" and "strategic-planning" keywords.
      This file controls plugin metadata for discovery and filtering.
    steps:
      - run: python3 -c "import json; data = json.load(open('plugins/beagle-analysis/.claude-plugin/plugin.json')); print(json.dumps(data, indent=2))"
      - run: |
          python3 -c "
          import json
          data = json.load(open('plugins/beagle-analysis/.claude-plugin/plugin.json'))
          assert 'strategy' in data.get('keywords', []), 'Missing strategy keyword'
          assert 'strategic-planning' in data.get('keywords', []), 'Missing strategic-planning keyword'
          print('Keywords verified:', data['keywords'])
          "
    expected: |
      plugin.json parses as valid JSON. Contains both "strategy" and "strategic-planning"
      in the keywords array.

  # --- Skill Frontmatter Validation ---

  - id: TC-03
    name: strategy-interview SKILL.md has valid YAML frontmatter
    context: |
      New skill added. YAML frontmatter controls how Claude Code discovers and
      triggers the skill. If frontmatter is malformed, the skill won't load.
    steps:
      - run: |
          python3 -c "
          import yaml
          content = open('plugins/beagle-analysis/skills/strategy-interview/SKILL.md').read()
          assert content.startswith('---'), 'Missing frontmatter delimiter'
          end = content.index('---', 3)
          fm = yaml.safe_load(content[3:end])
          assert fm.get('name') == 'strategy-interview', f'Wrong name: {fm.get(\"name\")}'
          assert fm.get('user-invocable') == True, 'Not user-invocable'
          assert 'description' in fm, 'Missing description'
          assert len(fm['description']) > 50, 'Description too short for good trigger matching'
          print(f'name: {fm[\"name\"]}')
          print(f'user-invocable: {fm[\"user-invocable\"]}')
          print(f'description length: {len(fm[\"description\"])} chars')
          "
    expected: |
      Frontmatter parses as valid YAML. name is "strategy-interview",
      user-invocable is true, description is present and substantive.

  - id: TC-04
    name: strategy-review SKILL.md has valid YAML frontmatter
    context: |
      New skill added. Same frontmatter validation as TC-03 for the review counterpart.
    steps:
      - run: |
          python3 -c "
          import yaml
          content = open('plugins/beagle-analysis/skills/strategy-review/SKILL.md').read()
          assert content.startswith('---'), 'Missing frontmatter delimiter'
          end = content.index('---', 3)
          fm = yaml.safe_load(content[3:end])
          assert fm.get('name') == 'strategy-review', f'Wrong name: {fm.get(\"name\")}'
          assert fm.get('user-invocable') == True, 'Not user-invocable'
          assert 'description' in fm, 'Missing description'
          assert len(fm['description']) > 50, 'Description too short'
          print(f'name: {fm[\"name\"]}')
          print(f'user-invocable: {fm[\"user-invocable\"]}')
          print(f'description length: {len(fm[\"description\"])} chars')
          "
    expected: |
      Frontmatter parses as valid YAML. name is "strategy-review",
      user-invocable is true, description is present and substantive.

  - id: TC-05
    name: humanize SKILL.md frontmatter still valid after refactor
    context: |
      humanize skill was refactored from monolith into SKILL.md + references/.
      Verifies the refactor didn't break frontmatter.
    steps:
      - run: |
          python3 -c "
          import yaml
          content = open('plugins/beagle-docs/skills/humanize/SKILL.md').read()
          assert content.startswith('---'), 'Missing frontmatter delimiter'
          end = content.index('---', 3)
          fm = yaml.safe_load(content[3:end])
          assert fm.get('name') == 'humanize', f'Wrong name: {fm.get(\"name\")}'
          assert fm.get('user-invocable') == True, 'Not user-invocable'
          print(f'name: {fm[\"name\"]}')
          print(f'user-invocable: {fm[\"user-invocable\"]}')
          "
    expected: |
      Frontmatter parses. name is "humanize", user-invocable is true.

  # --- Reference File Integrity ---

  - id: TC-06
    name: All strategy-interview reference paths resolve to real files
    context: |
      strategy-interview SKILL.md references 7 files via backtick paths like
      `references/kernel.md`. If any are missing, the skill will fail at runtime
      when Claude tries to load them.
    steps:
      - run: |
          python3 -c "
          import re, os
          base = 'plugins/beagle-analysis/skills/strategy-interview'
          content = open(f'{base}/SKILL.md').read()
          refs = set(re.findall(r'\x60references/[^\x60]+\.md\x60', content))
          refs = [r.strip('\x60') for r in refs]
          missing = []
          for ref in sorted(refs):
              path = os.path.join(base, ref)
              if os.path.isfile(path):
                  print(f'OK: {ref}')
              else:
                  missing.append(ref)
                  print(f'MISSING: {ref}')
          assert not missing, f'Missing references: {missing}'
          print(f'\nAll {len(refs)} references verified.')
          "
    expected: |
      All 7 references (kernel.md, bad-strategy.md, wardley-mapping.md,
      playing-to-win.md, blue-ocean.md, output-template.md, pressure-tests.md)
      exist on disk.

  - id: TC-07
    name: All strategy-review reference paths resolve to real files
    context: |
      strategy-review SKILL.md references 6 files. Same integrity check as TC-06.
    steps:
      - run: |
          python3 -c "
          import re, os
          base = 'plugins/beagle-analysis/skills/strategy-review'
          content = open(f'{base}/SKILL.md').read()
          refs = set(re.findall(r'\x60references/[^\x60]+\.md\x60', content))
          refs = [r.strip('\x60') for r in refs]
          missing = []
          for ref in sorted(refs):
              path = os.path.join(base, ref)
              if os.path.isfile(path):
                  print(f'OK: {ref}')
              else:
                  missing.append(ref)
                  print(f'MISSING: {ref}')
          assert not missing, f'Missing references: {missing}'
          print(f'\nAll {len(refs)} references verified.')
          "
    expected: |
      All 6 references (review-dimensions.md, review-lenses.md,
      interview-lens-audit.md, review-template.md, judge-artifact-schema.md,
      pressure-tests.md) exist on disk.

  - id: TC-08
    name: All humanize reference paths resolve after refactor
    context: |
      humanize was split from monolith. References that were inline are now
      external files. Verify nothing was lost in the refactor.
    steps:
      - run: |
          python3 -c "
          import re, os
          base = 'plugins/beagle-docs/skills/humanize'
          content = open(f'{base}/SKILL.md').read()
          refs = set(re.findall(r'\x60references/[^\x60]+\.md\x60', content))
          refs = [r.strip('\x60') for r in refs]
          missing = []
          for ref in sorted(refs):
              path = os.path.join(base, ref)
              if os.path.isfile(path):
                  print(f'OK: {ref}')
              else:
                  missing.append(ref)
                  print(f'MISSING: {ref}')
          assert not missing, f'Missing references: {missing}'
          print(f'\nAll {len(refs)} references verified.')
          "
    expected: |
      All 3 references (vocabulary-swaps.md, fix-strategies.md,
      developer-voice.md) exist on disk.

  # --- Skill Size Compliance ---

  - id: TC-09
    name: All changed SKILL.md files are under 500-line limit
    context: |
      CLAUDE.md states "Keep SKILL.md under 500 lines; use references/ for details."
      Both new skills are close to the limit. Verify compliance.
    steps:
      - run: |
          wc -l \
            plugins/beagle-analysis/skills/strategy-interview/SKILL.md \
            plugins/beagle-analysis/skills/strategy-review/SKILL.md \
            plugins/beagle-docs/skills/humanize/SKILL.md
    expected: |
      All three files are under 500 lines.
      strategy-interview: ~317 lines
      strategy-review: ~336 lines
      humanize: ~281 lines

  # --- Cross-Skill Reference Integrity ---

  - id: TC-10
    name: strategy-interview and strategy-review correctly cross-reference each other
    context: |
      These skills are complementary — interview builds strategy, review evaluates it.
      Both descriptions should mention the other to help Claude route correctly.
      If cross-references are broken, users get sent to the wrong skill.
    steps:
      - run: |
          python3 -c "
          si = open('plugins/beagle-analysis/skills/strategy-interview/SKILL.md').read()
          sr = open('plugins/beagle-analysis/skills/strategy-review/SKILL.md').read()
          assert 'strategy-review' in si, 'strategy-interview does not mention strategy-review'
          print('OK: strategy-interview references strategy-review')
          assert 'strategy-interview' in sr, 'strategy-review does not mention strategy-interview'
          print('OK: strategy-review references strategy-interview')
          "
    expected: |
      Both skills mention each other by name, enabling correct routing.

  # --- Naming Consistency ---

  - id: TC-11
    name: Skill directory names match frontmatter name fields
    context: |
      Claude Code discovers skills by directory name and validates against
      frontmatter. A mismatch means the skill loads but can't be invoked
      by the expected name.
    steps:
      - run: |
          python3 -c "
          import yaml, os
          skills = [
              'plugins/beagle-analysis/skills/strategy-interview',
              'plugins/beagle-analysis/skills/strategy-review',
              'plugins/beagle-docs/skills/humanize',
          ]
          for skill_dir in skills:
              dir_name = os.path.basename(skill_dir)
              content = open(f'{skill_dir}/SKILL.md').read()
              end = content.index('---', 3)
              fm = yaml.safe_load(content[3:end])
              fm_name = fm.get('name', '')
              if dir_name == fm_name:
                  print(f'OK: {dir_name} == {fm_name}')
              else:
                  raise AssertionError(f'MISMATCH: dir={dir_name} vs frontmatter={fm_name}')
          "
    expected: |
      All three skills have directory names matching their frontmatter name field.

  # --- Durable State Path Convention ---

  - id: TC-12
    name: strategy-interview writes working state to correct path convention
    context: |
      strategy-interview creates durable state at .beagle/strategy/<subject-slug>/.
      Verify the SKILL.md documents this path and the state.md/strategy-notes.md
      file conventions are consistently referenced.
    steps:
      - run: |
          python3 -c "
          content = open('plugins/beagle-analysis/skills/strategy-interview/SKILL.md').read()
          assert '.beagle/strategy/' in content, 'Missing .beagle/strategy/ state path'
          assert 'state.md' in content, 'Missing state.md reference'
          assert 'strategy-notes.md' in content, 'Missing strategy-notes.md reference'
          assert 'strategy-draft.md' in content, 'Missing strategy-draft.md reference'
          print('OK: All durable state paths documented')
          print('  - .beagle/strategy/<subject-slug>/')
          print('  - state.md (working state)')
          print('  - strategy-notes.md (resume artifact)')
          print('  - strategy-draft.md (final output)')
          "
    expected: |
      SKILL.md documents all four artifact paths consistently:
      .beagle/strategy/<slug>/, state.md, strategy-notes.md, strategy-draft.md.

  # --- Review Output Artifacts ---

  - id: TC-13
    name: strategy-review documents both prose and JSON output artifacts
    context: |
      strategy-review produces two outputs: strategy-review.md (prose) and
      strategy-review.json (machine-readable judge artifact). The JSON schema
      is defined in references/judge-artifact-schema.md. If either output
      convention is missing, downstream consumers break.
    steps:
      - run: |
          python3 -c "
          content = open('plugins/beagle-analysis/skills/strategy-review/SKILL.md').read()
          assert 'strategy-review.md' in content, 'Missing strategy-review.md output reference'
          assert 'strategy-review.json' in content, 'Missing strategy-review.json output reference'
          assert 'judge-artifact-schema' in content, 'Missing judge-artifact-schema reference'
          print('OK: Both output artifacts documented')
          print('  - strategy-review.md (prose review)')
          print('  - strategy-review.json (judge artifact)')
          print('  - Schema defined in references/judge-artifact-schema.md')
          "
    expected: |
      SKILL.md references both output formats and links to the JSON schema.

  # --- Reference Content Validation ---

  - id: TC-14
    name: Reference files are non-empty and contain substantive content
    context: |
      A reference file that exists but is empty or trivially short is worse
      than a missing file — the skill will "load" it but get no guidance.
      Verify all 16 new/changed reference files have real content.
    steps:
      - run: |
          python3 -c "
          import os
          refs = [
              'plugins/beagle-analysis/skills/strategy-interview/references/kernel.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/bad-strategy.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/wardley-mapping.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/playing-to-win.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/blue-ocean.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/output-template.md',
              'plugins/beagle-analysis/skills/strategy-interview/references/pressure-tests.md',
              'plugins/beagle-analysis/skills/strategy-review/references/review-dimensions.md',
              'plugins/beagle-analysis/skills/strategy-review/references/review-lenses.md',
              'plugins/beagle-analysis/skills/strategy-review/references/interview-lens-audit.md',
              'plugins/beagle-analysis/skills/strategy-review/references/review-template.md',
              'plugins/beagle-analysis/skills/strategy-review/references/judge-artifact-schema.md',
              'plugins/beagle-analysis/skills/strategy-review/references/pressure-tests.md',
              'plugins/beagle-docs/skills/humanize/references/vocabulary-swaps.md',
              'plugins/beagle-docs/skills/humanize/references/fix-strategies.md',
              'plugins/beagle-docs/skills/humanize/references/developer-voice.md',
          ]
          min_bytes = 500
          for ref in refs:
              size = os.path.getsize(ref)
              name = '/'.join(ref.split('/')[-3:])
              if size >= min_bytes:
                  print(f'OK: {name} ({size:,} bytes)')
              else:
                  print(f'WARN: {name} only {size} bytes — may be too thin')
          print(f'\nChecked {len(refs)} reference files (min {min_bytes} bytes)')
          "
    expected: |
      All 16 reference files exist and contain at least 500 bytes of content.
      Most should be 1KB+ given they provide framework-level guidance.

  # --- No Orphan Reference Files ---

  - id: TC-15
    name: No orphan reference files exist without SKILL.md mention
    context: |
      Reference files that exist on disk but aren't mentioned in SKILL.md are
      dead weight — Claude will never load them. This catches files that were
      created but never wired into the skill.
    steps:
      - run: |
          python3 -c "
          import os, re

          def check_orphans(skill_dir):
              skill_path = os.path.join(skill_dir, 'SKILL.md')
              refs_dir = os.path.join(skill_dir, 'references')
              content = open(skill_path).read()
              orphans = []
              for f in sorted(os.listdir(refs_dir)):
                  if f.endswith('.md') and f'references/{f}' not in content:
                      orphans.append(f)
              return orphans

          for skill in [
              'plugins/beagle-analysis/skills/strategy-interview',
              'plugins/beagle-analysis/skills/strategy-review',
              'plugins/beagle-docs/skills/humanize',
          ]:
              name = skill.split('/')[-1]
              orphans = check_orphans(skill)
              if orphans:
                  print(f'ORPHANS in {name}: {orphans}')
              else:
                  print(f'OK: {name} — no orphan references')
          "
    expected: |
      No orphan reference files. Every .md in references/ is mentioned
      somewhere in the parent SKILL.md.
